# ===================
# DEV Profile
# ===================

# H2 Database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:campingdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Log
logging.level.com.camping.erp=DEBUG
spring.output.ansi.enabled=ALWAYS

# Dev Auto Login (로그인 기능 완성 후 false로 변경)
dev.auto-login=true
dev.auto-login.username=${DEV_AUTO_LOGIN_USERNAME:admin}

# Init SQL Data (resources/db/data.sql)
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.data-locations=classpath:db/data.sql
spring.jpa.defer-datasource-initialization=true
